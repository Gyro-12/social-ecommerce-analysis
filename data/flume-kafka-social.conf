agent.sources = r1
agent.sinks = k1
agent.channels = c1

# 配置 source：监听 netcat 端口
agent.sources.r1.type = netcat
agent.sources.r1.bind = 0.0.0.0
agent.sources.r1.port = 10050

# 配置 channel：使用内存通道
agent.channels.c1.type = memory
agent.channels.c1.capacity = 10000
agent.channels.c1.transactionCapacity = 1000

# 配置 sink：写入 Kafka
agent.sinks.k1.type = org.apache.flume.sink.kafka.KafkaSink
agent.sinks.k1.kafka.bootstrap.servers = master:9092
agent.sinks.k1.kafka.topic = social-ecommerce
agent.sinks.k1.kafka.flumeBatchSize = 100
agent.sinks.k1.kafka.producer.acks = 1

# 绑定
agent.sources.r1.channels = c1
agent.sinks.k1.channel = c1
